name: Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run-desktop:
        description: 'Build desktop (Windows + macOS)'
        required: false
        default: true
        type: boolean
      run-android:
        description: 'Build Android APK'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run-desktop }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            args: ''

          - os: macos-15-intel
            target: x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            args: ''

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Download static ffmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          # Map target triple → ffmpeg.martin-riedl.de arch name
          case "${{ matrix.target }}" in
            x86_64-apple-darwin)
              ARCH=amd64
              BINARY="ffmpeg-x86_64-apple-darwin"
              ;;
          esac
          echo "Downloading static ffmpeg (${{ matrix.target }})…"
          curl -L -o ffmpeg.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/${ARCH}/release/ffmpeg.zip"
          unzip -o ffmpeg.zip
          mv ffmpeg "src-tauri/binaries/${BINARY}"
          chmod +x "src-tauri/binaries/${BINARY}"
          # Remove quarantine attribute so macOS Gatekeeper allows execution
          xattr -d com.apple.quarantine "src-tauri/binaries/${BINARY}" 2>/dev/null || true
          echo "Static ffmpeg binary ready:"
          file "src-tauri/binaries/${BINARY}"
          otool -L "src-tauri/binaries/${BINARY}" | head -5

      - name: Download static ffmpeg (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          BINARY="ffmpeg-x86_64-pc-windows-msvc.exe"
          echo "Downloading static ffmpeg (Windows x64)…"
          # Use GitHub API to resolve the latest release download URL reliably
          LATEST_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest \
            | grep 'browser_download_url' \
            | grep -F 'win64-gpl.zip' \
            | head -1 \
            | cut -d'"' -f4)
          echo "Downloading from: $LATEST_URL"
          curl -L -o ffmpeg.zip "$LATEST_URL"
          unzip -o ffmpeg.zip
          # The zip contains a subfolder like ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe
          find . -name 'ffmpeg.exe' -exec mv {} "src-tauri/binaries/${BINARY}" \;
          echo "Static ffmpeg binary ready:"
          ls -lh "src-tauri/binaries/${BINARY}"

      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing & notarization ──
          # To enable code signing, configure these secrets in your GitHub repo:
          #   Settings → Secrets and variables → Actions
          #
          #   APPLE_CERTIFICATE         base64-encoded .p12 Developer ID certificate
          #   APPLE_CERTIFICATE_PASSWORD password for the .p12
          #   APPLE_SIGNING_IDENTITY    e.g. "Developer ID Application: Your Name (TEAMID)"
          #   APPLE_ID                  your Apple ID email
          #   APPLE_PASSWORD            App-Specific Password
          #   APPLE_TEAM_ID             your 10-character Apple Developer Team ID
          #
          # Until then, ad-hoc signing is used (signingIdentity: "-" in tauri.conf.json).
          # Uncomment the lines below when secrets are configured:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: "视频转换工具箱 · TRANSVD v__VERSION__"
          releaseBody: |
            See the assets to download this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run-android }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Create placeholder FFmpeg binaries (Android uses ffmpeg.wasm)
        run: |
          set -e
          mkdir -p src-tauri/binaries
          # Tauri requires a sidecar binary to exist for each externalBin entry
          # for EVERY installed Rust target. On Android we use ffmpeg.wasm, so
          # these placeholders will never actually be executed.
          for target in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            printf '%s\n' '#!/bin/sh' 'echo "FFmpeg sidecar not available on Android; using ffmpeg.wasm instead"' 'exit 0' > "src-tauri/binaries/ffmpeg-${target}"
            chmod +x "src-tauri/binaries/ffmpeg-${target}"
          done
          echo "Created placeholders for:"
          ls -la src-tauri/binaries/ffmpeg-*

      - name: Setup Android project for CI
        run: |
          set -e
          # Delete the committed tauri.settings.gradle which has machine-specific
          # Cargo registry paths (e.g. /Users/ericever/...) that don't exist in CI
          rm -f src-tauri/gen/android/tauri.settings.gradle src-tauri/gen/android/local.properties

          # Regenerate Android project non-interactively with CI-correct paths
          bun tauri android init --ci --skip-targets-install

          # Ensure Gradle can find the Android SDK
          echo "sdk.dir=$ANDROID_HOME" > src-tauri/gen/android/local.properties

          # Explicitly point NDK_HOME to the version we installed (setup-android
          # installs ndk-version, but the runner may have a different default NDK)
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Build Android APK (skip AAB bundle)
        run: bun tauri android build --apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: transvd-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APK_FILE=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found to upload to release"
            exit 1
          fi
          echo "Uploading $APK_FILE to release ${{ github.ref_name }}..."
          # Retry in case tauri-action hasn't created the release yet
          UPLOADED=false
          for i in 1 2 3 4 5; do
            if gh release upload "${{ github.ref_name }}" "$APK_FILE" --clobber; then
              echo "APK uploaded successfully to release ${{ github.ref_name }}"
              UPLOADED=true
              break
            fi
            echo "Attempt $i: release not ready yet, waiting 30s..."
            sleep 30
          done
          if [ "$UPLOADED" = false ]; then
            echo "ERROR: Failed to upload APK to release ${{ github.ref_name }} after 5 attempts" >&2
            exit 1
          fi
